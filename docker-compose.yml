version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: digital-twin-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - OPENWEATHER_CITY=London
    volumes:
      - ./backend/src:/app/src
      - /app/node_modules
    networks:
      - digital-twin-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: digital-twin-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - digital-twin-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  digital-twin-network:
    driver: bridge

volumes:
  node_modules_backend:
  node_modules_frontend:
