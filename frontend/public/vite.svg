<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad)" />
  
  <!-- CO2 Symbol -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    CO₂
  </text>
  
  <!-- Activity Wave -->
  <path d="M 40 120 Q 60 110, 80 120 T 120 120 T 160 120" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
